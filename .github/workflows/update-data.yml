name: Update CCNC Dashboard Data

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8am UTC (midnight Pacific)
  workflow_dispatch:       # Allows manual trigger anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 now

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Fetch Monday.com data
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: node fetch-data.js

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

name: Update CCNC Dashboard Data

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8am UTC (midnight Pacific)
  workflow_dispatch:       # Allows manual trigger anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 now

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Fetch Monday.com data
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: node fetch-data.js

      - name: Commit data.json to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data.json $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
